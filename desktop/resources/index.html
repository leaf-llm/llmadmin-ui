<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local LLM Gateway</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      color: #f8fafc;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .error {
      color: #f87171;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      max-width: 320px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">Local LLM Gateway</div>
  <div class="spinner"></div>
  <div class="status" id="status">Starting gateway...</div>
  <div class="error" id="error"></div>

  <script src="js/neutralino.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
