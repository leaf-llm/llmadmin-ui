name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    strategy:
      matrix:
        include:
          # Server binaries
          - os: windows-latest
            artifact: portkey-gateway.exe
            build_type: server
          # Desktop apps
          - os: ubuntu-latest
            artifact: local-llm-gateway_amd64.deb
            build_type: desktop
          # macOS desktop apps
          - os: macos-latest
            artifact: local-llm-gateway_arm64.dmg
            build_type: desktop
            arch: arm64
          - os: macos-15
            artifact: local-llm-gateway_x64.dmg
            build_type: desktop
            arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Shared dependencies (all platforms) ────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Node.js (for neu CLI)
        if: matrix.build_type == 'desktop'
        uses: actions/setup-node@v4

      - name: Install Neutralinojs CLI
        if: matrix.build_type == 'desktop'
        run: npm install -g @neutralinojs/neu

      - name: Install dependencies
        run: bun install

      - name: Install UI dependencies
        run: cd ui && bun install

      - name: Build UI
        run: bun run build:ui

      - name: Copy conf.json
        run: cp conf.example.json conf.json

      - name: Start Xvfb (headless display)
        if: matrix.build_type == 'desktop' && runner.os == 'Linux'
        run: |
          which Xvfb || sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2

      # ── Platform-specific build ────────────────────────────────────
      - name: Build server binary
        if: matrix.build_type == 'server'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-15" ]; then
            bun build src/start-server.ts --compile --target=bun-macos-x64 --outfile=build/${{ matrix.artifact }}
          else
            BUN_OUTPUT=build/${{ matrix.artifact }} bun run bun:build
          fi

      - name: Build desktop app
        if: matrix.build_type == 'desktop'
        run: |
          npm run desktop:setup
          npm run build:desktop

      - name: Package .deb
        if: matrix.build_type == 'desktop' && runner.os == 'Linux'
        uses: ./.github/actions/package-deb
        with:
          dist_path: desktop/dist/local-llm-gateway

      - name: Package .dmg
        if: matrix.build_type == 'desktop' && runner.os == 'macOS'
        uses: ./.github/actions/package-dmg
        with:
          app_path: desktop/dist/mac_${{ matrix.arch }}/release/local-llm-gateway.app
          output_dmg: ${{ matrix.artifact }}

      # ── Upload artifacts ────────────────────────────────────────────
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ matrix.build_type == 'desktop' && runner.os == 'Linux' && 'desktop/dist/local-llm-gateway' || matrix.build_type == 'desktop' && runner.os == 'macOS' && '.' || 'build' }}/${{ matrix.artifact }}
          asset_name: ${{ matrix.artifact }}
          asset_content_type: ${{ matrix.build_type == 'desktop' && runner.os == 'Linux' && 'application/vnd.debian.binary-package' || matrix.build_type == 'desktop' && runner.os == 'macOS' && 'application/x-apple-diskimage' || 'application/octet-stream' }}

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.build_type == 'desktop' && runner.os == 'Linux' && 'desktop/dist/local-llm-gateway' || matrix.build_type == 'desktop' && runner.os == 'macOS' && '.' || 'build' }}/${{ matrix.artifact }}
