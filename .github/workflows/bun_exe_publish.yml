name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    strategy:
      matrix:
        include:
          # Server binaries
          - runs-on: self-hosted
            artifact: local-llm-gateway_x64.dmg
            build_type: desktop
            arch: x64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      # ── Shared dependencies (all platforms) ────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Node.js (for neu CLI)
        if: matrix.build_type == 'desktop'
        uses: actions/setup-node@v4

      - name: Install Neutralinojs CLI
        if: matrix.build_type == 'desktop'
        run: npm install -g @neutralinojs/neu

      - name: Install jq (required for build-mac.sh)
        if: matrix.build_type == 'desktop'
        run: |
          which jq || (command -v brew >/dev/null 2>&1 && brew install jq) || sudo apt-get install -y jq

      - name: Install dependencies
        run: bun install

      - name: Install UI dependencies
        run: cd ui && bun install

      - name: Build UI
        run: bun run build:ui

      - name: Copy conf.json
        run: cp conf.example.json conf.json

      - name: Start Xvfb (headless display)
        if: matrix.build_type == 'desktop' && runner.os == 'Linux'
        run: |
          which Xvfb || sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2

      # ── Platform-specific build ────────────────────────────────────
      - name: Build server binary
        if: matrix.build_type == 'server'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-15" ]; then
            bun build src/start-server.ts --compile --target=bun-macos-x64 --outfile=build/${{ matrix.artifact }}
          else
            BUN_OUTPUT=build/${{ matrix.artifact }} bun run bun:build
          fi

      - name: Build desktop app (macOS)
        if: matrix.build_type == 'desktop' && matrix.arch == 'x64'
        run: |
          # Build portkey-gateway first
          BUN_OUTPUT=build/portkey-gateway bun run bun:build
          # Build UI
          bun run build:ui
          # Run neutralino build scripts
          npm run desktop:setup
          cd desktop
          chmod +x build-mac.sh
          ./build-mac.sh

      - name: Package .deb
        if: matrix.build_type == 'desktop' && runner.os == 'Linux'
        uses: ./.github/actions/package-deb
        with:
          dist_path: desktop/dist/local-llm-gateway

      - name: Package .dmg (from build-mac.sh output)
        if: matrix.build_type == 'desktop' && matrix.arch == 'x64'
        shell: bash
        run: |
          cd desktop
          mkdir -p dist
          hdiutil create -srcfolder "dist/mac_x64/SelfHostedLLMGateway.app" \
            -volname "SelfHostedLLMGateway" \
            -fs HFS+ \
            -format UDZO \
            "../${{ matrix.artifact }}"

      # ── Upload artifacts ────────────────────────────────────────────
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: desktop/${{ matrix.artifact }}
          asset_name: ${{ matrix.artifact }}
          asset_content_type: application/x-apple-diskimage

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/${{ matrix.artifact }}
