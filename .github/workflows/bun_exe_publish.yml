name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    strategy:
      matrix:
        include:
          # Desktop apps
          - os: ubuntu-latest
            artifact: local-llm-gateway_1.0.0_amd64.deb
            build_type: desktop
          # macOS desktop apps (build on self-hosted macOS 12 runner)
          - artifact: local-llm-gateway_x64.dmg
            build_type: desktop
            arch: x64
            os: ''
          # Windows desktop apps
          - os: windows-latest
            artifact: local-llm-gateway.exe
            build_type: desktop
    runs-on: ${{ matrix.os || 'self-hosted' }}

    steps:
      - uses: actions/checkout@v4

      # ── Shared dependencies (all platforms) ────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Node.js (for neu CLI)
        if: matrix.build_type == 'desktop'
        uses: actions/setup-node@v4

      - name: Install Neutralinojs CLI
        if: matrix.build_type == 'desktop'
        run: npm install -g @neutralinojs/neu

      - name: Install dependencies
        run: bun install

      - name: Install UI dependencies
        run: cd ui && bun install

      - name: Build UI
        run: bun run build:ui

      - name: Copy conf.json
        run: cp conf.example.json conf.json

      - name: Start Xvfb (headless display)
        if: matrix.build_type == 'desktop' && runner.os == 'Linux'
        run: |
          which Xvfb || sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2

      # ── Platform-specific build ────────────────────────────────────
      - name: Build desktop app
        run: |
          npm run desktop:setup
          npm run build:desktop

      - name: Package .deb
        if: matrix.build_type == 'desktop' && runner.os == 'Linux'
        uses: ./.github/actions/package-deb
        with:
          dist_path: desktop/dist/local-llm-gateway

      - name: Package .dmg
        if: matrix.build_type == 'desktop' && runner.os == 'macOS'
        uses: ./.github/actions/package-dmg
        with:
          dist_dir: desktop/dist/local-llm-gateway
          binary_name: local-llm-gateway-mac_${{ matrix.arch }}
          output_dmg: ${{ matrix.artifact }}

      - name: Package Windows exe
        if: matrix.build_type == 'desktop' && runner.os == 'Windows'
        uses: ./.github/actions/package-windows
        with:
          dist_dir: desktop/dist/local-llm-gateway
          output_exe: ${{ matrix.artifact }}

      # ── Upload to server ────────────────────────────────────────────
      - name: Upload to server via SCP
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Determine source path based on OS
          case "${{ runner.os }}" in
            Linux)
              SOURCE_PATH="desktop/dist/local-llm-gateway/${{ matrix.artifact }}"
              ;;
            macOS)
              SOURCE_PATH="desktop/dist/local-llm-gateway/${{ matrix.artifact }}"
              ;;
            Windows)
              SOURCE_PATH="desktop/dist/local-llm-gateway/${{ matrix.artifact }}"
              ;;
          esac

          echo "Uploading: $SOURCE_PATH"
          ls -la "$SOURCE_PATH" || dir "$SOURCE_PATH"

          # Write SSH key and set permissions
          echo "$SSH_KEY" > /tmp/upload_key
          chmod 600 /tmp/upload_key

          # Upload via SCP
          scp -o StrictHostKeyChecking=no -i /tmp/upload_key "$SOURCE_PATH" "$SERVER_USER@$SERVER_HOST:/home/ubuntu/artifacts/"

          # Cleanup
          rm -f /tmp/upload_key
