name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    strategy:
      matrix:
        include:
          # macOS desktop apps (build on self-hosted macOS 12 runner)
          - artifact: local-llm-gateway_x64.dmg
            build_type: desktop
            arch: x64
            os: ''
    runs-on: ${{ matrix.os || 'self-hosted' }}

    steps:
      - uses: actions/checkout@v4

      # ── Shared dependencies (all platforms) ────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Node.js (for neu CLI)
        if: matrix.build_type == 'desktop'
        uses: actions/setup-node@v4

      - name: Install Neutralinojs CLI
        if: matrix.build_type == 'desktop'
        run: npm install -g @neutralinojs/neu

      - name: Install dependencies
        run: bun install

      - name: Install UI dependencies
        run: cd ui && bun install

      - name: Build UI
        run: bun run build:ui

      - name: Copy conf.json
        run: cp conf.example.json conf.json

      # ── Platform-specific build ────────────────────────────────────
      - name: Build desktop app
        run: |
          npm run desktop:setup
          npm run build:desktop

      - name: Package .dmg
        uses: ./.github/actions/package-dmg
        with:
          dist_dir: desktop/dist/local-llm-gateway
          binary_name: local-llm-gateway-mac_${{ matrix.arch }}
          output_dmg: ${{ matrix.artifact }}

      # ── Upload artifacts ────────────────────────────────────────────
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.artifact }}
          asset_name: ${{ matrix.artifact }}
          asset_content_type: application/x-apple-diskimage

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./${{ matrix.artifact }}
