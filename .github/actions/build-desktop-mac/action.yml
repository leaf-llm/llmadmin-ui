name: Build Desktop (macOS)
description: Builds Neutralinojs desktop app for macOS

inputs:
  arch:
    description: "Architecture (arm64 or x64)"
    required: false
    default: arm64

outputs:
  dist_path:
    description: "Path to the build output"
    value: desktop/dist/mac_${{ inputs.arch }}/release

runs:
  using: composite
  steps:
    - name: Update Neutralinojs binaries
      shell: bash
      run: cd desktop && neu update

    - name: Build desktop backend
      shell: bash
      run: |
        ARCH=${{ inputs.arch }}
        if [ "$ARCH" = "arm64" ]; then
          bun build src/start-server.ts --compile --target=bun-macos-arm64 --outfile=desktop/build/portkey-gateway
        else
          bun build src/start-server.ts --compile --target=bun-macos-x64 --outfile=desktop/build/portkey-gateway
        fi

    - name: Build UI
      shell: bash
      run: npm run build:ui

    - name: Build Neutralinojs app
      id: build
      shell: bash
      run: |
        cd desktop
        neu build
        echo "dist_path=desktop/dist/mac_${{ inputs.arch }}/release" >> "$GITHUB_OUTPUT"

    - name: Copy binary and resources
      shell: bash
      run: node desktop/scripts/copy-binary.js mac
