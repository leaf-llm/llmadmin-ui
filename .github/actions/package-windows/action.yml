name: Package Windows installer
description: Packages a Windows Neutralinojs build into an Inno Setup installer

inputs:
  dist_dir:
    description: "Path to dist directory containing build outputs"
    required: true
  output_exe:
    description: "Output .exe filename"
    required: true
  version:
    description: "Application version (read from package.json if omitted)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Inno Setup
      shell: pwsh
      run: choco install innosetup --yes --no-progress

    - name: Package Windows installer
      shell: bash
      run: |
        REPO_ROOT="$GITHUB_WORKSPACE"
        SCRIPT_DIR="$REPO_ROOT/scripts"
        chmod +x "$SCRIPT_DIR/package-windows.sh" 2>/dev/null || true
        "$SCRIPT_DIR/package-windows.sh" "${{ inputs.dist_dir }}" "${{ inputs.output_exe }}" "${{ inputs.version }}"
