name: Package Windows portable exe
description: Packages a Windows Neutralinojs build into a portable exe using 7-Zip SFX

inputs:
  dist_dir:
    description: "Path to dist directory containing build outputs"
    required: true
  output_exe:
    description: "Output .exe filename"
    required: true

runs:
  using: composite
  steps:
    - name: Download and Setup 7-Zip
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2408.msi" -OutFile "C:\temp\7zip.msi" -UseBasicParsing
        Start-Process -FilePath "msiexec.exe" -ArgumentList "/i","C:\temp\7zip.msi","/quiet","/norestart" -Wait -PassThru

    - name: Package Windows exe
      shell: bash
      run: |
        REPO_ROOT="$GITHUB_WORKSPACE"
        SCRIPT_DIR="$REPO_ROOT/scripts"
        chmod +x "$SCRIPT_DIR/package-windows.sh" 2>/dev/null || true
        "$SCRIPT_DIR/package-windows.sh" "${{ inputs.dist_dir }}" "${{ inputs.output_exe }}"
