name: Package Windows portable exe
description: Packages a Windows Neutralinojs build into a portable exe

inputs:
  dist_dir:
    description: "Path to dist directory containing build outputs"
    required: true
  output_exe:
    description: "Output .exe filename"
    required: true

runs:
  using: composite
  steps:
    - name: Download and Setup Enigma Virtual Box
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "C:\temp" | Out-Null
        Invoke-WebRequest -Uri "https://enigmaprotector.com/assets/files/enigmavb.exe" -OutFile "C:\temp\enigmavb.exe" -UseBasicParsing
        Start-Process -FilePath "C:\temp\enigmavb.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART",'/DIR="C:\EnigmaVirtualBox"' -Wait -PassThru

    - name: Package Windows exe
      shell: bash
      run: |
        REPO_ROOT="$GITHUB_WORKSPACE"
        SCRIPT_DIR="$REPO_ROOT/scripts"
        chmod +x "$SCRIPT_DIR/package-windows.sh" 2>/dev/null || true
        "$SCRIPT_DIR/package-windows.sh" "${{ inputs.dist_dir }}" "${{ inputs.output_exe }}"