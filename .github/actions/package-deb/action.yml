name: Package .deb
description: Packages a Neutralinojs Linux build into a Debian package.

inputs:
  dist_path:
    description: "Path to the neu build output directory"
    required: true
  version:
    description: "Package version"
    required: false
    default: "1.0.0"

runs:
  using: composite
  steps:
    - name: Package .deb
      shell: bash
      run: |
        "${{ github.action_path }}/../../scripts/package-deb.sh" "${{ inputs.dist_path }}" "${{ inputs.version }}"
